services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: accessscan
      POSTGRES_PASSWORD: accessscan
      POSTGRES_DB: accessscan
    ports: ["5432:5432"]
    volumes: ["accessscan_pg:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
volumes:
  accessscan_pg:
